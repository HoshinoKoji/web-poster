<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" role="img" aria-labelledby="title desc">
  <title id="title">Illustrative study design</title>
  <desc id="desc">Participants move through prior calibration, sequential choices, and a transfer test.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M0 0 12 6 0 12Z" fill="#8c2b55"/>
    </marker>
  </defs>
  <rect width="760" height="240" rx="28" fill="#fff0f6"/>
  <path d="M225 120h62M473 120h62" stroke="#8c2b55" stroke-width="8" marker-end="url(#arrow)"/>
  <g font-family="Inter,Arial,sans-serif" text-anchor="middle">
    <g transform="translate(35 35)">
      <rect width="190" height="170" rx="24" fill="#fff" stroke="#d8cbd1" stroke-width="3"/>
      <circle cx="95" cy="61" r="34" fill="#f8d9e6"/>
      <path d="M72 60c15-28 32 28 48 0" fill="none" stroke="#e96e9f" stroke-width="8" stroke-linecap="round"/>
      <text x="95" y="124" fill="#171216" font-size="24" font-weight="800">Calibrate prior</text>
      <text x="95" y="151" fill="#5f555b" font-size="17">12 observed examples</text>
    </g>
    <g transform="translate(285 35)">
      <rect width="190" height="170" rx="24" fill="#171216"/>
      <g transform="translate(47 26)">
        <rect width="42" height="67" rx="12" fill="#ff9fc4"/>
        <rect x="54" y="18" width="42" height="49" rx="12" fill="#e96e9f"/>
      </g>
      <text x="95" y="124" fill="#fff" font-size="24" font-weight="800">Choose &amp; learn</text>
      <text x="95" y="151" fill="#d8cbd1" font-size="17">120 contextual trials</text>
    </g>
    <g transform="translate(535 35)">
      <rect width="190" height="170" rx="24" fill="#fff" stroke="#d8cbd1" stroke-width="3"/>
      <path d="M60 83 93 48l38 35" fill="none" stroke="#e96e9f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="60" cy="83" r="10" fill="#8c2b55"/>
      <circle cx="93" cy="48" r="10" fill="#8c2b55"/>
      <circle cx="131" cy="83" r="10" fill="#8c2b55"/>
      <text x="95" y="124" fill="#171216" font-size="24" font-weight="800">Transfer test</text>
      <text x="95" y="151" fill="#5f555b" font-size="17">novel correlated options</text>
    </g>
  </g>
</svg>
